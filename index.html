<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markethub — маркетплейс</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f8;
            color: #1a1a2e;
            padding: 16px 20px 40px;
            transition: 0.3s;
        }

        body.dark {
            background: #0f0f1a;
            color: #e8e8f0;
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 0 18px;
            border-bottom: 2px solid #dde0e8;
        }

        body.dark header {
            border-bottom-color: #2a2a40;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            flex: 1;
            min-width: 180px;
            display: flex;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #cbd5e1;
            border-radius: 30px 0 0 30px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #1a1a2e;
        }

        body.dark .search-bar input {
            background: #1e1e32;
            border-color: #3a3a56;
            color: #eee;
        }

        .search-bar button {
            padding: 10px 22px;
            background: #7c3aed;
            border: none;
            border-radius: 0 30px 30px 0;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-bar button:hover {
            background: #5b21b6;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            font-size: 14px;
        }

        .header-actions .btn-outline {
            padding: 6px 14px;
            border-radius: 30px;
            background: #eef2ff;
            cursor: pointer;
            border: none;
            font-weight: 500;
        }

        body.dark .header-actions .btn-outline {
            background: #25253b;
            color: #ddd;
        }

        .cart-wrapper {
            position: relative;
            display: inline-block;
        }

        .cart-trigger {
            cursor: pointer;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 30px;
            background: #eef2ff;
            border: none;
            font-size: 14px;
        }

        body.dark .cart-trigger {
            background: #25253b;
            color: #ddd;
        }

        .cart-badge {
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            padding: 1px 10px;
            font-size: 13px;
            font-weight: 700;
            margin-left: 4px;
        }

        .cart-preview {
            display: none;
            position: absolute;
            right: 0;
            top: 44px;
            background: #fff;
            min-width: 260px;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.13);
            border: 1px solid #e2e8f0;
            z-index: 100;
        }

        body.dark .cart-preview {
            background: #1a1a2e;
            border-color: #33334d;
        }

        .cart-preview.show {
            display: block;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid #eef2f8;
        }

        body.dark .cart-item {
            border-bottom-color: #2a2a44;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== CATEGORIES ===== */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 22px 0 24px;
        }

        .categories button {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        body.dark .categories button {
            background: #18182a;
            border-color: #3a3a56;
            color: #ccc;
        }

        .categories button.active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }

        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 20px;
            background: #fff;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        body.dark .filters {
            background: #16162a;
        }

        .filters label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .filters input,
        .filters select {
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 14px;
        }

        body.dark .filters input,
        body.dark .filters select {
            background: #22223a;
            border-color: #3f3f5e;
            color: #eee;
        }

        .filters .btn-filter {
            padding: 8px 24px;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .filters .btn-reset {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            cursor: pointer;
        }

        body.dark .filters .btn-reset {
            border-color: #3f3f5e;
            color: #ccc;
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 16px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        body.dark .product-card {
            background: #18182c;
            border-color: #2a2a44;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.07);
        }

        .product-img {
            height: 130px;
            border-radius: 14px;
            background: linear-gradient(145deg, #e2e8f0, #d0d8e8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 12px;
        }

        body.dark .product-img {
            background: linear-gradient(145deg, #262642, #1a1a32);
        }

        .product-title {
            font-weight: 700;
            font-size: 17px;
        }

        .product-desc {
            font-size: 13px;
            color: #64748b;
            margin: 4px 0 8px;
            flex: 1;
        }

        body.dark .product-desc {
            color: #94a3b8;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: #7c3aed;
            margin: 4px 0 10px;
        }

        body.dark .product-price {
            color: #a78bfa;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .rating {
            color: #f59e0b;
            font-size: 14px;
        }

        .btn-cart {
            background: #7c3aed;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-cart:hover {
            background: #5b21b6;
        }

        .btn-cart.in-cart {
            background: #22c55e;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            max-width: 460px;
            width: 92%;
            padding: 28px 26px;
            border-radius: 28px;
            animation: pop 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        body.dark .modal {
            background: #1a1a30;
        }

        @keyframes pop {
            0% {
                transform: scale(0.92);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            margin-bottom: 8px;
        }

        .modal label {
            display: block;
            margin: 14px 0 4px;
            font-weight: 500;
            font-size: 14px;
        }

        .modal input,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 15px;
        }

        body.dark .modal input,
        body.dark .modal select {
            background: #22223a;
            border-color: #3f3f5e;
            color: #eee;
        }

        .modal .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .modal .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-primary {
            background: #7c3aed;
            color: #fff;
        }

        .btn-primary:hover {
            background: #5b21b6;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        body.dark .btn-secondary {
            background: #2e2e4a;
            color: #eee;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters label {
                flex-wrap: wrap;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            z-index: 9999;
        }

        body.dark .toast {
            background: #e8e8f0;
            color: #1a1a2e;
        }

        .toast.show {
            opacity: 1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <div class="logo">🛒 Markethub</div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск товаров..." />
                <button onclick="applyFilters()">Найти</button>
            </div>

            <div class="header-actions">
                <span class="btn-outline">👤 Вход</span>
                <span class="btn-outline">📦 Заказы</span>

                <div class="cart-wrapper">
                    <button class="cart-trigger" onclick="toggleCart()">
                        🛍️ Корзина <span class="cart-badge" id="cartCount">0</span>
                    </button>
                    <div class="cart-preview" id="cartPreview">
                        <div id="cartItems"><em>Корзина пуста</em></div>
                        <button class="btn-primary" style="width:100%;margin-top:14px;padding:10px;border-radius:30px;border:none;font-weight:700;cursor:pointer;" onclick="openCheckout()">
                            Оформить заказ
                        </button>
                    </div>
                </div>

                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </header>

        <!-- CATEGORIES -->
        <div class="categories" id="categoryFilter">
            <button class="active" data-cat="all">Все</button>
            <button data-cat="games">🎮 Игры</button>
            <button data-cat="accounts">👤 Аккаунты</button>
            <button data-cat="keys">🔑 Ключи</button>
            <button data-cat="software">💻 Софт</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <label>💰 Цена:
                <input type="number" id="priceMin" placeholder="от" style="width:70px" />
                <input type="number" id="priceMax" placeholder="до" style="width:70px" />
            </label>
            <label>Платформа:
                <select id="platformFilter">
                    <option value="all">Все</option>
                    <option value="pc">PC</option>
                    <option value="ps">PlayStation</option>
                    <option value="xbox">Xbox</option>
                    <option value="nintendo">Nintendo</option>
                </select>
            </label>
            <button class="btn-filter" onclick="applyFilters()">Применить</button>
            <button class="btn-reset" onclick="resetFilters()">Сбросить</button>
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="productGrid"></div>

    </div>

    <!-- CHECKOUT MODAL -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal">
            <h2>🧾 Оформление заказа</h2>
            <p style="color:#64748b;margin-bottom:14px;">Товаров: <strong id="modalCartCount">0</strong></p>

            <label>Ваше имя</label>
            <input type="text" id="customerName" placeholder="Иван Иванов" />

            <label>Email</label>
            <input type="email" id="customerEmail" placeholder="ivan@mail.ru" />

            <label>Способ оплаты</label>
            <select id="paymentMethod">
                <option>Банковская карта</option>
                <option>QIWI</option>
                <option>ЮMoney</option>
                <option>USDT (TRC20)</option>
            </select>

            <div class="btn-group">
                <button class="btn-secondary" onclick="closeCheckout()">Отмена</button>
                <button class="btn-primary" onclick="submitOrder()">✅ Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ===================== DATA =====================
        const products = [{
            id: 1,
            title: 'Steam аккаунт — CS2',
            desc: 'Ранг LE, 5 скинов, 100+ часов',
            price: 1290,
            category: 'accounts',
            platform: 'pc',
            emoji: '🎯'
        }, {
            id: 2,
            title: 'Cyberpunk 2077 (ключ)',
            desc: 'PC / GOG — регион RU',
            price: 1999,
            category: 'keys',
            platform: 'pc',
            emoji: '🔑'
        }, {
            id: 3,
            title: 'PlayStation Plus 12 мес.',
            desc: 'Подписка EU, активация',
            price: 3490,
            category: 'keys',
            platform: 'ps',
            emoji: '🎮'
        }, {
            id: 4,
            title: 'World of Warcraft акк',
            desc: '60 уровень, 300+ достижений',
            price: 2500,
            category: 'accounts',
            platform: 'pc',
            emoji: '⚔️'
        }, {
            id: 5,
            title: 'Xbox Game Pass Ultimate',
            desc: '3 месяца, глобальный ключ',
            price: 1299,
            category: 'keys',
            platform: 'xbox',
            emoji: '🎮'
        }, {
            id: 6,
            title: 'Adobe Premiere Pro',
            desc: '1 месяц, лицензия',
            price: 890,
            category: 'software',
            platform: 'pc',
            emoji: '🎬'
        }, {
            id: 7,
            title: 'Nintendo eShop карта',
            desc: '50$ на счёт, регион USA',
            price: 4600,
            category: 'keys',
            platform: 'nintendo',
            emoji: '🕹️'
        }, {
            id: 8,
            title: 'Аккаунт Fortnite',
            desc: 'Сезон 8, скины + V-bucks',
            price: 1700,
            category: 'accounts',
            platform: 'all',
            emoji: '💥'
        }, {
            id: 9,
            title: 'Microsoft Office 2021',
            desc: 'ключ для PC, бессрочный',
            price: 3200,
            category: 'software',
            platform: 'pc',
            emoji: '📁'
        }, {
            id: 10,
            title: 'Red Dead Redemption 2',
            desc: 'ключ для Rockstar Launcher',
            price: 1790,
            category: 'keys',
            platform: 'pc',
            emoji: '🤠'
        }, {
            id: 11,
            title: 'Аккаунт Valorant',
            desc: 'Скины на 5 пистолетов, платина',
            price: 2100,
            category: 'accounts',
            platform: 'pc',
            emoji: '🔫'
        }, {
            id: 12,
            title: 'Ghost of Tsushima (PS5)',
            desc: 'диск, б/у, отличное состояние',
            price: 3200,
            category: 'games',
            platform: 'ps',
            emoji: '⚡'
        }, {
            id: 13,
            title: 'Minecraft Java + Bedrock',
            desc: 'ключ для PC, глобальный',
            price: 1890,
            category: 'keys',
            platform: 'pc',
            emoji: '⛏️'
        }, {
            id: 14,
            title: 'Аккаунт GTA V Online',
            desc: '150 млн, все тачки, ранг 120',
            price: 2800,
            category: 'accounts',
            platform: 'all',
            emoji: '🏎️'
        }, {
            id: 15,
            title: 'Windows 11 Pro лицензия',
            desc: 'ключ OEM, бессрочный',
            price: 550,
            category: 'software',
            platform: 'pc',
            emoji: '🪟'
        }, ];

        // ===================== STATE =====================
        let cart = [];
        let filtered = [...products];

        // ===================== RENDER =====================
        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            if (!list || !list.length) {
                grid.innerHTML = `<div class="empty-state">😕 Товаров не найдено</div>`;
                return;
            }
            grid.innerHTML = list.map(p => `
                    <div class="product-card" data-id="${p.id}">
                        <div class="product-img">${p.emoji}</div>
                        <div class="product-title">${p.title}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">${p.price.toLocaleString()} ₽</div>
                        <div class="product-footer">
                            <span class="rating">⭐ ${(4 + Math.random() * 0.9).toFixed(1)}</span>
                            <button class="btn-cart" onclick="addToCart(${p.id})">➕ В корзину</button>
                        </div>
                    </div>
                `).join('');
        }

        // ===================== FILTERS =====================
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const catEl = document.querySelector('#categoryFilter .active');
            const cat = catEl ? catEl.dataset.cat : 'all';
            const min = parseFloat(document.getElementById('priceMin').value) || 0;
            const max = parseFloat(document.getElementById('priceMax').value) || Infinity;
            const plat = document.getElementById('platformFilter').value;

            filtered = products.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
                const matchCat = cat === 'all' || p.category === cat;
                const matchPrice = p.price >= min && p.price <= max;
                const matchPlat = plat === 'all' || p.platform === plat || p.platform === 'all';
                return matchSearch && matchCat && matchPrice && matchPlat;
            });
            renderProducts(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('priceMin').value = '';
            document.getElementById('priceMax').value = '';
            document.getElementById('platformFilter').value = 'all';
            document.querySelectorAll('#categoryFilter button').forEach(b => b.classList.remove('active'));
            document.querySelector('#categoryFilter button[data-cat="all"]').classList.add('active');
            applyFilters();
        }

        // ===================== CATEGORY CLICK =====================
        document.querySelectorAll('#categoryFilter button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#categoryFilter button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });

        // ===================== SEARCH ENTER =====================
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') applyFilters();
        });

        // ===================== CART =====================
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            showToast(`✅ ${product.title} добавлен в корзину`);

            const btn = document.querySelector(`.product-card[data-id="${id}"] .btn-cart`);
            if (btn) {
                btn.textContent = '✅ В корзине';
                btn.classList.add('in-cart');
                setTimeout(() => {
                    btn.textContent = '➕ В корзину';
                    btn.classList.remove('in-cart');
                }, 900);
            }
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartCount').textContent = count;
            const container = document.getElementById('cartItems');
            if (!cart.length) {
                container.innerHTML = '<em>Корзина пуста</em>';
                return;
            }
            container.innerHTML = cart.map(i =>
                `<div class="cart-item">
                        <span>${i.emoji} ${i.title} (x${i.qty})</span>
                        <span>${(i.price * i.qty).toLocaleString()} ₽</span>
                    </div>`
            ).join('');
        }

        function toggleCart() {
            document.getElementById('cartPreview').classList.toggle('show');
        }

        // ===================== CHECKOUT =====================
        function openCheckout() {
            if (!cart.length) {
                showToast('Корзина пуста!');
                return;
            }
            document.getElementById('modalCartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('checkoutModal').classList.add('open');
            document.getElementById('cartPreview').classList.remove('show');
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('open');
        }

        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            if (!name || !email) {
                showToast('⚠️ Заполните имя и email!');
                return;
            }
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const method = document.getElementById('paymentMethod').value;
            alert(
                `✅ Заказ оформлен!\n\nПокупатель: ${name}\nEmail: ${email}\nОплата: ${method}\nСумма: ${total.toLocaleString()} ₽\n\nСпасибо за покупку! 🎉`);
            cart = [];
            updateCartUI();
            closeCheckout();
            document.getElementById('customerName').value = '';
            document.getElementById('customerEmail').value = '';
            showToast('🎉 Заказ успешно оформлен!');
        }

        // ===================== TOAST =====================
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2600);
        }

        // ===================== THEME =====================
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        // ===================== CLOSE CART OUTSIDE =====================
        document.addEventListener('click', (e) => {
            const wrap = document.querySelector('.cart-wrapper');
            if (wrap && !wrap.contains(e.target)) {
                document.getElementById('cartPreview').classList.remove('show');
            }
        });

        // ===================== CLOSE MODAL ON OVERLAY =====================
        document.getElementById('checkoutModal').addEventListener('click', function(e) {
            if (e.target === this) closeCheckout();
        });

        // ===================== INIT =====================
        // restore theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        renderProducts(products);
        updateCartUI();
    </script>

</body>
</html>
